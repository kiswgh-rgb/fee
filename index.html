<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fee">
<meta name="theme-color" content="#FFFFFF">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<title>Fee v10.6</title>
<style>
  :root {
    --bg-primary: #FFFFFF;
    --bg-secondary: #F7F6F2;
    --bg-tertiary: #F1EFE8;
    --text-primary: #1A1A1A;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --accent: #185FA5;
    --accent-dark: #0C447C;
    --accent-bg: #E6F1FB;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }
  .container {
    max-width: 380px;
    margin: 0 auto;
    padding: 16px 16px calc(80px + env(safe-area-inset-bottom, 0));
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .date-label { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .date-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .check-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .cell {
    min-height: 64px;
    padding: 12px 16px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: manipulation;
    transition: background 0.2s, outline-color 0.2s;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .cell.checked {
    background: var(--accent-bg);
    border-color: transparent;
    outline: 1.5px solid var(--accent);
    outline-offset: -1.5px;
  }
  .cell-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .cell.checked .cell-name { color: var(--accent-dark); }
  .cell-count {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.02em;
  }
  .cell.checked .cell-count { color: var(--accent); }
  .cell-weight {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .cell.checked .cell-weight { color: var(--accent); }
  .summary {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
  }
  .summary .total-val {
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
  }
  .bucket-num { font-size: 13px; font-weight: 400; color: var(--text-secondary); margin-left: 2px; }
  .calendar {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 14px;
  }
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .cal-nav {
    width: 32px; height: 32px;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--text-primary);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
    font-size: 18px;
    font-family: inherit;
  }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-nav:not(:disabled):active { background: var(--bg-tertiary); }
  .cal-title { font-size: 13px; font-weight: 500; }
  .cal-weekdays, .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 4px;
  }
  .cal-weekdays { margin-bottom: 4px; }
  .cal-weekday {
    text-align: center;
    font-size: 11px;
    color: var(--text-tertiary);
    padding: 2px 0;
  }
  .cal-cell {
    aspect-ratio: 1;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-primary);
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }
  .cal-cell.disabled { opacity: 0.35; pointer-events: none; }
  .cal-cell.selected { outline: 1.5px solid var(--accent); outline-offset: -1.5px; }
  .cal-cell.today:not(.selected) { outline: 1px dashed var(--text-secondary); outline-offset: -1px; }
  .cal-cell.blank { background: transparent; border: none; pointer-events: none; }
  .record-bar {
    margin-top: 14px;
    text-align: center;
  }
  .record-btn {
    padding: 8px 18px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text-tertiary);
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    touch-action: manipulation;
    letter-spacing: 0.02em;
  }
  .record-btn:active { background: var(--bg-secondary); }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 360px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 14px 16px 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    border-bottom: 0.5px solid var(--border);
  }
  .modal-body {
    padding: 12px 14px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    line-height: 1.45;
  }
  .modal-textarea {
    width: 100%;
    min-height: 260px;
    padding: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    line-height: 1.45;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    resize: vertical;
    box-sizing: border-box;
    -webkit-appearance: none;
  }
  .modal-msg {
    margin-top: 8px;
    font-size: 12px;
    min-height: 16px;
  }
  .modal-msg.ok { color: var(--accent); }
  .modal-msg.err { color: #B33A2C; }
  .modal-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    border-top: 0.5px solid var(--border);
  }
  .modal-footer-right {
    display: flex;
    gap: 6px;
  }
  .modal-btn {
    padding: 8px 14px;
    font-size: 13px;
    font-family: inherit;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-primary);
    cursor: pointer;
    touch-action: manipulation;
  }
  .modal-btn:active { background: var(--bg-secondary); }
  .modal-btn.primary {
    background: var(--accent);
    color: #FFFFFF;
    border-color: var(--accent);
  }
  .modal-btn.primary:active { background: var(--accent-dark); }
  .loading {
    text-align: center;
    padding: 32px 0;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .sync-field { margin-bottom: 10px; }
  .sync-field label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .sync-input {
    width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    box-sizing: border-box;
    -webkit-appearance: none;
  }
  .study-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .study-row {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 56px; padding: 10px 14px;
    border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg-primary);
  }
  .study-name { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .study-ctrl { display: flex; align-items: center; gap: 10px; }
  .study-hours { font-size: 15px; font-weight: 500; color: var(--accent); min-width: 50px; text-align: center; font-variant-numeric: tabular-nums; }
  .study-step {
    width: 36px; height: 36px; padding: 0; font-size: 20px; font-family: inherit; line-height: 1;
    border: 0.5px solid var(--border); border-radius: 8px; background: var(--bg-secondary); color: var(--text-primary);
    cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center;
  }
  .study-step:disabled { opacity: 0.3; }
  .study-step:not(:disabled):active { background: var(--bg-tertiary); }
  .study-density { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .study-density-label { font-size: 13px; color: var(--text-secondary); margin-right: 2px; }
  .density-btn {
    flex: 1; padding: 10px 0; font-size: 14px; font-family: inherit;
    border: 0.5px solid var(--border); border-radius: 8px; background: var(--bg-primary); color: var(--text-secondary);
    cursor: pointer; touch-action: manipulation;
  }
  .density-btn.active { background: var(--accent-bg); border-color: transparent; outline: 1.5px solid var(--accent); outline-offset: -1.5px; color: var(--accent-dark); font-weight: 600; }
  .density-btn:not(.active):active { background: var(--bg-secondary); }
  .study-summary { text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  .study-summary span { color: var(--accent); font-weight: 600; }
  .navbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 90;
    display: flex; max-width: 380px; margin: 0 auto;
    background: var(--bg-primary); border-top: 0.5px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-btn {
    flex: 1; padding: 12px 0; font-size: 13px; font-weight: 600; font-family: inherit;
    border: none; background: transparent; color: var(--text-tertiary); cursor: pointer;
    touch-action: manipulation; letter-spacing: 0.02em;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.nav-icon { flex: 0 0 48px; font-size: 18px; font-weight: 400; }
  .nav-btn:active { background: var(--bg-secondary); }
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%) translateY(20px);
    bottom: calc(66px + env(safe-area-inset-bottom, 0)); z-index: 120;
    max-width: 320px; width: max-content; padding: 10px 16px; border-radius: 8px;
    background: #2A2A2A; color: #FFF; font-size: 13px; line-height: 1.4; text-align: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { background: var(--accent); }
  .toast.err { background: #B33A2C; }
  .set-actions { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
  .set-action-btn {
    padding: 11px 12px; font-size: 14px; font-family: inherit; border-radius: 8px;
    border: 0.5px solid var(--border); background: var(--bg-secondary); color: var(--text-primary);
    cursor: pointer; touch-action: manipulation; text-align: left;
  }
  .set-action-btn b { display: block; font-size: 14px; }
  .set-action-btn small { color: var(--text-tertiary); font-weight: 400; }
  .set-action-btn:active { background: var(--bg-tertiary); }
  .set-lastsync { font-size: 12px; color: var(--text-tertiary); margin: 6px 0; }
  .set-adv { margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 10px; }
  .set-adv summary { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
  .set-adv-btns { display: flex; gap: 6px; margin-top: 8px; }
  .set-adv-btns .modal-btn { flex: 1; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div id="loading" class="loading">불러오는 중...</div>
  <div id="app" class="hidden">
    <div class="header">
      <div id="date-label" class="date-label">—</div>
      <div id="date-sub" class="date-sub">—</div>
    </div>

    <div id="view-habit">
      <div id="check-grid" class="check-grid"></div>
      <div class="summary">
        <div>오늘 <span id="today-liter">0.00</span>L</div>
        <div>누적 <strong class="total-val"><span id="bucket-current">0.00</span></strong> / <span id="bucket-goal">365</span>L<span id="bucket-num" class="bucket-num"></span></div>
      </div>
    </div>

    <div id="view-study" class="hidden">
      <div id="study-cards" class="study-cards"></div>
      <div class="study-density">
        <span class="study-density-label">밀도</span>
        <button id="density-1" type="button" class="density-btn">하</button>
        <button id="density-2" type="button" class="density-btn">중</button>
        <button id="density-3" type="button" class="density-btn">상</button>
      </div>
      <div class="study-summary">오늘 <span id="study-today">0.0</span>h · 누적 <span id="study-total">0</span>h</div>
    </div>

    <div class="calendar">
      <div class="cal-header">
        <button id="cal-prev" type="button" class="cal-nav" aria-label="이전 달">‹</button>
        <div id="cal-title" class="cal-title">—</div>
        <button id="cal-next" type="button" class="cal-nav" aria-label="다음 달">›</button>
      </div>
      <div id="cal-weekdays" class="cal-weekdays"></div>
      <div id="cal-grid" class="cal-grid"></div>
    </div>
  </div>

  <nav id="navbar" class="navbar hidden">
    <button id="nav-habit" type="button" class="nav-btn active">F</button>
    <button id="nav-study" type="button" class="nav-btn">S</button>
    <button id="nav-sync" type="button" class="nav-btn">Sync</button>
    <button id="nav-settings" type="button" class="nav-btn nav-icon" aria-label="설정">⚙</button>
  </nav>
  <div id="toast" class="toast"></div>

  <div id="modal-record" class="modal-backdrop hidden">
    <div class="modal">
      <div id="modal-record-header" class="modal-header">원문(JSON)</div>
      <div class="modal-body">
        <div class="modal-desc">
          전체 데이터(JSON)입니다. 직접 수정한 뒤 반영을 누르면 저장됩니다.
          복사해서 백업해 두거나, 백업본을 붙여넣어 복구할 수 있습니다.
        </div>
        <textarea id="record-text" class="modal-textarea" spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
        <div id="record-msg" class="modal-msg"></div>
      </div>
      <div class="modal-footer">
        <button id="record-select-all" type="button" class="modal-btn">전체선택</button>
        <div class="modal-footer-right">
          <button id="record-close" type="button" class="modal-btn">닫기</button>
          <button id="record-apply" type="button" class="modal-btn primary">반영</button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-settings" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">⚙ 동기화 설정</div>
      <div class="modal-body">
        <div class="modal-desc">
          PAT는 이 기기 localStorage에만 저장되며 코드에는 남지 않습니다.
          대상 레포 Contents 쓰기 권한이 있는 fine-grained 토큰을 사용하세요.
        </div>
        <div class="sync-field">
          <label for="set-owner">owner (GitHub 계정명)</label>
          <input id="set-owner" class="sync-input" type="text" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="예: kiswgh-rgb">
        </div>
        <div class="sync-field">
          <label for="set-repo">레포</label>
          <input id="set-repo" class="sync-input" type="text" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="CHI_fee_data">
        </div>
        <div class="sync-field">
          <label for="set-branch">브랜치</label>
          <input id="set-branch" class="sync-input" type="text" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="main">
        </div>
        <div class="sync-field">
          <label for="set-pat">Personal Access Token</label>
          <input id="set-pat" class="sync-input" type="password" spellcheck="false" autocapitalize="off" autocorrect="off" autocomplete="off" placeholder="github_pat_...">
        </div>
        <div class="sync-field">
          <label for="set-routine-path">습관 파일</label>
          <input id="set-routine-path" class="sync-input" type="text" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="daily_routine.json">
        </div>
        <div class="sync-field">
          <label for="set-study-path">스터디 파일</label>
          <input id="set-study-path" class="sync-input" type="text" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="semu_study.json">
        </div>
        <div class="set-actions">
          <button id="set-up" type="button" class="set-action-btn"><b>⬆ 올리기 (폰 → repo)</b><small>현재 기록을 repo에 백업 (2파일)</small></button>
          <button id="set-down" type="button" class="set-action-btn"><b>⬇ 복구 (repo → 폰)</b><small>repo 데이터로 폰 채우기 (2파일)</small></button>
        </div>
        <div id="set-lastsync" class="set-lastsync">마지막 동기화: 없음</div>
        <div id="set-msg" class="modal-msg"></div>
        <details class="set-adv">
          <summary>고급 · 원문 JSON 백업/복구</summary>
          <div class="set-adv-btns">
            <button id="set-raw-routine" type="button" class="modal-btn">습관 원문</button>
            <button id="set-raw-study" type="button" class="modal-btn">스터디 원문</button>
          </div>
        </details>
      </div>
      <div class="modal-footer">
        <span></span>
        <div class="modal-footer-right">
          <button id="set-close" type="button" class="modal-btn">닫기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  const STORAGE_PREFIX = 'fee_v10_';
  const CONFIG_VERSION = 'v10.6';
  const APP_VERSION = 'v10.6';
  const START_DATE = new Date(2026, 4, 10);
  START_DATE.setHours(0,0,0,0);
  const EPSILON = 0.001;

  // chi_bootstrap_2026-05-13 확정 사항
  const DEFAULT_CONFIG = {
    version: CONFIG_VERSION,
    items: [
      { name: '수면의식', weight: 40 },
      { name: '저녁공부', weight: 30 },
      { name: '케틀벨',   weight: 30 }
    ],
    daily_total: 1.0,
    bucket_goal: 365,
    bootstrap_source: 'chi_bootstrap_2026-05-13'
  };

  // === v9.6 → v10.x 마이그레이션 (최초 1회만 실행) ===
  const LEGACY_IMPORT = {
    seed_total_liter: 7.599999999999996,
    legacy_items: [
      { name: '아침공부', weight: 30 },
      { name: '점심공부', weight: 10 },
      { name: '저녁공부', weight: 30 },
      { name: '케틀벨',   weight: 30 }
    ],
    legacy_daily_total: 1,
    legacy_cutoff_date: '2026-05-25',
    days: {
      '2026-05-10': [false, true, true, true],
      '2026-05-11': [false, true, true, true],
      '2026-05-12': [false, true, true, true],
      '2026-05-13': [false, true, true, true],
      '2026-05-14': [false, false, false, true],
      '2026-05-15': [true, false, false, true],
      '2026-05-16': [true, false, false, false],
      '2026-05-17': [false, true, false, true],
      '2026-05-18': [false, false, true, true],
      '2026-05-19': [false, false, true, false],
      '2026-05-20': [false, true, false, false],
      '2026-05-21': [true, true, true, true],
      '2026-05-22': [false, false, true, true],
      '2026-05-25': [true, false, false, true]
    }
  };

  const $ = (id) => document.getElementById(id);
  const pad = (n) => String(n).padStart(2,'0');
  const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const sameDay = (a,b) => a.getTime() === b.getTime();
  const isToday = (d) => { const t=new Date(); t.setHours(0,0,0,0); return sameDay(d,t); };
  const weekdayKo = (d) => ['일','월','화','수','목','금','토'][d.getDay()];
  const haptic = () => { try { if(navigator.vibrate) navigator.vibrate(15); } catch(e){} };

  function getKey(k){
    try { const v = localStorage.getItem(STORAGE_PREFIX + k); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  }
  function setKey(k, v){
    try { localStorage.setItem(STORAGE_PREFIX + k, JSON.stringify(v)); return true; }
    catch(e){ return false; }
  }
  function delKey(k){ try { localStorage.removeItem(STORAGE_PREFIX + k); } catch(e){} }
  function listKeys(prefix){
    const out = [];
    try {
      for(let i=0; i<localStorage.length; i++){
        const k = localStorage.key(i);
        if(k && k.indexOf(STORAGE_PREFIX + prefix) === 0){
          out.push(k.slice(STORAGE_PREFIX.length));
        }
      }
    } catch(e){}
    return out;
  }

  function itemsSignature(items){
    return items.map(i => `${i.name}:${i.weight}`).join('|');
  }

  function runLegacyImport(){
    if(getKey('legacy_imported')) return false;

    const lw = LEGACY_IMPORT.legacy_items.reduce((s,i)=> s + i.weight, 0);
    const liters = LEGACY_IMPORT.legacy_items.map(i => (i.weight / lw) * LEGACY_IMPORT.legacy_daily_total);

    Object.keys(LEGACY_IMPORT.days).forEach(dk => {
      const checks = LEGACY_IMPORT.days[dk];
      let dl = 0;
      checks.forEach((c, i) => { if(c) dl += liters[i]; });
      const ratio = Math.min(1, dl / LEGACY_IMPORT.legacy_daily_total);
      setKey('legacy:' + dk, { ratio: ratio });
    });

    setKey('total_liter', LEGACY_IMPORT.seed_total_liter);
    setKey('legacy_imported', true);
    setKey('legacy_cutoff', LEGACY_IMPORT.legacy_cutoff_date);
    return true;
  }

  let config = null;
  let currentDay = null;
  let totalLiter = 0;
  let viewDate = new Date(); viewDate.setHours(0,0,0,0);
  if(viewDate.getTime() < START_DATE.getTime()) viewDate = new Date(START_DATE);
  let calMonth = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
  let migrationNote = null;

  // 항목별 누적 달성 일수 (v10 day:* 키에서만 집계)
  let itemCounts = [];

  function recomputeItemCounts(){
    itemCounts = config.items.map(()=> 0);
    listKeys('day:').forEach(k => {
      const day = getKey(k);
      if(!day || !day.checks) return;
      day.checks.forEach((c, i) => {
        if(c && itemCounts[i] !== undefined) itemCounts[i] += 1;
      });
    });
  }

  function loadConfig(){
    let c = getKey('config');

    if(!c){
      c = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
      setKey('config', c);
      return { config: c, note: null };
    }

    const oldSig = c.items ? itemsSignature(c.items) : '';
    const newSig = itemsSignature(DEFAULT_CONFIG.items);

    if(oldSig !== newSig){
      listKeys('day:').forEach(delKey);
      listKeys('legacy:').forEach(delKey);
      delKey('total_liter');
      delKey('legacy_imported');
      delKey('legacy_cutoff');
      c = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
      setKey('config', c);
      return { config: c, note: '항목 변경 — 기존 데이터 초기화됨' };
    }

    let updated = false;
    if(c.version !== CONFIG_VERSION){ c.version = CONFIG_VERSION; updated = true; }
    if(c.bucket_goal !== DEFAULT_CONFIG.bucket_goal){
      const oldGoal = c.bucket_goal;
      c.bucket_goal = DEFAULT_CONFIG.bucket_goal;
      updated = true;
      migrationNote = `통 목표 ${oldGoal}L → ${DEFAULT_CONFIG.bucket_goal}L`;
    }
    if(c.daily_total !== DEFAULT_CONFIG.daily_total){ c.daily_total = DEFAULT_CONFIG.daily_total; updated = true; }
    if(c.bootstrap_source !== DEFAULT_CONFIG.bootstrap_source){ c.bootstrap_source = DEFAULT_CONFIG.bootstrap_source; updated = true; }
    // 이전 버전의 start_date 잔재 제거
    c.items.forEach(it => { if('start_date' in it) delete it.start_date; });
    if(updated) setKey('config', c);
    return { config: c, note: migrationNote };
  }

  function initTotalLiter(){
    const s = getKey('total_liter');
    if(typeof s === 'number'){ totalLiter = s; return; }
    let sum = 0;
    listKeys('day:').forEach(k => {
      const day = getKey(k);
      if(!day || !day.checks) return;
      day.checks.forEach((c, i) => {
        if(c && config.items[i]) sum += config.items[i].liter;
      });
    });
    totalLiter = sum;
    setKey('total_liter', totalLiter);
  }

  function computeItemLiters(){
    const tw = config.items.reduce((s,i)=> s + i.weight, 0);
    config.items.forEach(it => { it.liter = (it.weight / tw) * config.daily_total; });
  }

  function bucketState(){
    const bn = Math.floor(totalLiter / config.bucket_goal) + 1;
    const cb = totalLiter - (bn - 1) * config.bucket_goal;
    return { bucketNum: bn, currentInBucket: cb };
  }

  function loadDay(d){
    let day = getKey('day:' + dateKey(d));
    if(!day) day = { checks: config.items.map(()=>false) };
    while(day.checks.length < config.items.length) day.checks.push(false);
    day.checks.length = config.items.length;
    return day;
  }
  function saveDay(d, day){ setKey('day:' + dateKey(d), day); }

  function dayLiter(checks){
    let s = 0;
    checks.forEach((c, i) => { if(c && config.items[i]) s += config.items[i].liter; });
    return s;
  }

  function isLegacyDate(d){
    const cutoff = getKey('legacy_cutoff');
    if(!cutoff) return false;
    return dateKey(d) <= cutoff;
  }

  function renderDate(){
    $('date-label').textContent = `${viewDate.getFullYear()}.${pad(viewDate.getMonth()+1)}.${pad(viewDate.getDate())}`;
    let sub = isToday(viewDate) ? `오늘 · ${weekdayKo(viewDate)}요일` : `${weekdayKo(viewDate)}요일`;
    if(isLegacyDate(viewDate) && getKey('legacy:' + dateKey(viewDate))){
      sub += ' · 이월 기록';
    }
    $('date-sub').textContent = sub;
  }

  function buildCell(idx){
    const it = config.items[idx];
    const checked = currentDay.checks[idx];
    const legacy = isLegacyDate(viewDate);
    const cell = document.createElement('div');
    cell.className = 'cell' + (checked ? ' checked' : '');
    cell.dataset.idx = idx;
    cell.setAttribute('role', 'button');
    cell.setAttribute('tabindex', '0');
    cell.setAttribute('aria-pressed', checked ? 'true' : 'false');

    if(legacy){
      cell.style.opacity = '0.5';
      cell.style.cursor = 'not-allowed';
    }

    const cnt = itemCounts[idx] || 0;
    const countHtml = `<span class="cell-count">${cnt}D</span>`;

    cell.innerHTML =
      '<div class="cell-name">' + it.name + countHtml + '</div>' +
      '<div class="cell-weight">' + it.weight + '%</div>';

    if(!legacy) attachTap(cell, idx);
    return cell;
  }

  function attachTap(cell, idx){
    let tStartX = 0, tStartY = 0, tTouched = false;
    const TOL = 10;

    function toggle(){
      const nc = !currentDay.checks[idx];
      currentDay.checks[idx] = nc;
      const delta = config.items[idx].liter * (nc ? 1 : -1);
      totalLiter = Math.max(0, totalLiter + delta);
      // 항목 카운트 증감
      itemCounts[idx] = Math.max(0, (itemCounts[idx] || 0) + (nc ? 1 : -1));
      cell.classList.toggle('checked', nc);
      cell.setAttribute('aria-pressed', nc ? 'true' : 'false');
      // 카운트 표시 갱신
      const cntEl = cell.querySelector('.cell-count');
      if(cntEl) cntEl.textContent = itemCounts[idx] + 'D';
      updateSummary();
      paintCalCell(viewDate);
      haptic();
      saveDay(viewDate, currentDay);
      setKey('total_liter', totalLiter);
    }

    cell.addEventListener('touchstart', (e) => {
      if(e.touches && e.touches[0]){
        tStartX = e.touches[0].clientX;
        tStartY = e.touches[0].clientY;
      }
      tTouched = true;
    }, { passive: true });

    cell.addEventListener('touchend', (e) => {
      if(!tTouched) return;
      let moved = false;
      if(e.changedTouches && e.changedTouches[0]){
        const dx = e.changedTouches[0].clientX - tStartX;
        const dy = e.changedTouches[0].clientY - tStartY;
        if(Math.abs(dx) > TOL || Math.abs(dy) > TOL) moved = true;
      }
      if(!moved){ e.preventDefault(); toggle(); }
      setTimeout(() => { tTouched = false; }, 400);
    }, { passive: false });

    cell.addEventListener('touchcancel', () => { tTouched = false; }, { passive: true });
    cell.addEventListener('click', () => { if(tTouched) return; toggle(); });
    cell.addEventListener('keydown', (e) => {
      if(e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); toggle(); }
    });
  }

  function updateSummary(){
    $('today-liter').textContent = dayLiter(currentDay.checks).toFixed(2);
    const bs = bucketState();
    $('bucket-current').textContent = bs.currentInBucket.toFixed(2);
    $('bucket-goal').textContent = String(config.bucket_goal);
    $('bucket-num').textContent = bs.bucketNum > 1 ? ` (통 ${bs.bucketNum})` : '';
  }

  function renderChecks(){
    currentDay = loadDay(viewDate);
    const grid = $('check-grid');
    grid.innerHTML = '';
    config.items.forEach((_, i) => grid.appendChild(buildCell(i)));
  }

  function densityStyle(r){
    if(r < EPSILON) return { bg: null, fg: null, stage: 0 };
    if(r < 0.30 - EPSILON) return { bg: '#E8E8E8', fg: '#1A1A1A', stage: 1 };
    if(r < 0.60 - EPSILON) return { bg: '#B0B0B0', fg: '#1A1A1A', stage: 2 };
    if(r < 0.90 - EPSILON) return { bg: '#606060', fg: '#FFFFFF', stage: 3 };
    return { bg: '#1A1A1A', fg: '#FFFFFF', stage: 4 };
  }

  function applyCellStyle(cell, r){
    const s = densityStyle(r);
    if(s.bg){
      cell.style.background = s.bg;
      cell.style.borderColor = 'transparent';
      cell.style.color = s.fg;
    } else {
      cell.style.background = 'var(--bg-primary)';
      cell.style.borderColor = 'var(--border)';
      cell.style.color = 'var(--text-primary)';
    }
  }

  function ratioFromKey(k){
    const day = getKey('day:' + k);
    if(day && day.checks){
      let l = 0;
      day.checks.forEach((c, i) => { if(c && config.items[i]) l += config.items[i].liter; });
      if(l > 0) return Math.min(1, l / config.daily_total);
    }
    const legacy = getKey('legacy:' + k);
    if(legacy && typeof legacy.ratio === 'number') return legacy.ratio;
    return 0;
  }

  // 현재 뷰에 맞는 달력 색 비율 (습관=달성비율 / 스터디=시간합×밀도)
  function calRatioFromKey(k){
    return currentView === 'study' ? studyRatioFromKey(k) : ratioFromKey(k);
  }

  function paintCalCell(d){
    const k = dateKey(d);
    const cell = document.querySelector('[data-cal-key="' + k + '"]');
    if(!cell) return;
    applyCellStyle(cell, calRatioFromKey(k));
  }

  function renderCalendar(){
    $('cal-title').textContent = `${calMonth.getFullYear()}.${pad(calMonth.getMonth()+1)}`;

    const wd = $('cal-weekdays');
    if(!wd.hasChildNodes()){
      ['월','화','수','목','금','토','일'].forEach(w => {
        const el = document.createElement('div');
        el.className = 'cal-weekday';
        el.textContent = w;
        wd.appendChild(el);
      });
    }

    const grid = $('cal-grid');
    grid.innerHTML = '';
    const first = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
    const last  = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0);
    const firstWd = (first.getDay() + 6) % 7;
    const today = new Date(); today.setHours(0,0,0,0);

    for(let i = 0; i < firstWd; i++){
      const blank = document.createElement('div');
      blank.className = 'cal-cell blank';
      grid.appendChild(blank);
    }

    for(let day = 1; day <= last.getDate(); day++){
      const d = new Date(calMonth.getFullYear(), calMonth.getMonth(), day);
      const k = dateKey(d);
      const before = d.getTime() < START_DATE.getTime();
      const future = d.getTime() > today.getTime();
      const isSel = sameDay(d, viewDate);
      const isTod = sameDay(d, today);

      const cell = document.createElement('div');
      cell.className = 'cal-cell' +
        ((before||future) ? ' disabled' : '') +
        (isSel ? ' selected' : '') +
        (isTod && !isSel ? ' today' : '');
      cell.dataset.calKey = k;
      cell.textContent = String(day);

      if(!before && !future){
        let cTouched = false;
        cell.addEventListener('touchend', (e) => {
          cTouched = true;
          e.preventDefault();
          onDateSelected(d);
        }, { passive: false });
        cell.addEventListener('click', () => {
          if(cTouched){ cTouched = false; return; }
          onDateSelected(d);
        });
      }

      grid.appendChild(cell);
      applyCellStyle(cell, calRatioFromKey(k));
    }
  }

  function canPrev(){
    const lastOfPrev = new Date(calMonth.getFullYear(), calMonth.getMonth(), 0);
    return lastOfPrev.getTime() >= START_DATE.getTime();
  }
  function canNext(){
    const today = new Date(); today.setHours(0,0,0,0);
    const nextFirst = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 1);
    return nextFirst.getTime() <= today.getTime();
  }
  function updateCalNav(){
    $('cal-prev').disabled = !canPrev();
    $('cal-next').disabled = !canNext();
  }

  $('cal-prev').addEventListener('click', () => {
    if(!canPrev()) return;
    calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()-1, 1);
    renderCalendar();
    updateCalNav();
  });
  $('cal-next').addEventListener('click', () => {
    if(!canNext()) return;
    calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 1);
    renderCalendar();
    updateCalNav();
  });

  // ===== 기록 모달 =====
  function collectRecord(){
    const data = {
      format: 'fee-record-1',
      exported_at: new Date().toISOString(),
      app_version: APP_VERSION,
      config: getKey('config'),
      total_liter: getKey('total_liter'),
      days: {},
      legacy: {},
      legacy_cutoff: getKey('legacy_cutoff') || null
    };
    listKeys('day:').forEach(k => {
      const dk = k.slice(4);
      data.days[dk] = getKey(k);
    });
    listKeys('legacy:').forEach(k => {
      const dk = k.slice(7);
      data.legacy[dk] = getKey(k);
    });
    return data;
  }

  // ===== 원문(JSON) 모달 — 습관/스터디 공용 =====
  let rawTarget = 'routine';
  function showMsg(text, kind){
    const m = $('record-msg');
    m.textContent = text;
    m.className = 'modal-msg' + (kind ? ' ' + kind : '');
  }
  function openRawModal(target){
    rawTarget = target;
    $('modal-record-header').textContent = (target === 'study') ? '스터디 원문(JSON)' : '습관 원문(JSON)';
    $('record-text').value = JSON.stringify(target === 'study' ? collectStudy() : collectRecord(), null, 2);
    showMsg('', '');
    $('modal-record').classList.remove('hidden');
  }
  function closeRecordModal(){ $('modal-record').classList.add('hidden'); }

  // 습관 데이터 import (localStorage 저장 + 상태 갱신; DOM 렌더는 호출측 reloadAll)
  function applyRoutineData(parsed){
    if(!parsed || typeof parsed !== 'object') throw new Error('데이터 형식 오류');
    if(!parsed.config || !Array.isArray(parsed.config.items)) throw new Error('config.items 누락');
    if(parsed.days && typeof parsed.days !== 'object') throw new Error('days 형식 오류');
    if(parsed.legacy && typeof parsed.legacy !== 'object') throw new Error('legacy 형식 오류');

    listKeys('day:').forEach(delKey);
    listKeys('legacy:').forEach(delKey);
    delKey('config'); delKey('total_liter'); delKey('legacy_cutoff');

    setKey('legacy_imported', true);
    setKey('config', parsed.config);
    if(typeof parsed.total_liter === 'number') setKey('total_liter', parsed.total_liter);
    if(parsed.legacy_cutoff) setKey('legacy_cutoff', parsed.legacy_cutoff);
    if(parsed.days) Object.keys(parsed.days).forEach(dk => setKey('day:' + dk, parsed.days[dk]));
    if(parsed.legacy) Object.keys(parsed.legacy).forEach(dk => setKey('legacy:' + dk, parsed.legacy[dk]));

    const cr = loadConfig();
    config = cr.config;
    computeItemLiters();
    recomputeItemCounts();

    const ts = getKey('total_liter');
    if(typeof ts === 'number'){
      totalLiter = ts;
    } else {
      totalLiter = 0;
      listKeys('day:').forEach(k => {
        const day = getKey(k);
        if(!day || !day.checks) return;
        day.checks.forEach((c, i) => { if(c && config.items[i]) totalLiter += config.items[i].liter; });
      });
      setKey('total_liter', totalLiter);
    }
  }

  function applyRecord(){
    let parsed;
    try { parsed = JSON.parse($('record-text').value); }
    catch(e){ showMsg('JSON 형식 오류: ' + e.message, 'err'); return; }
    try {
      if(rawTarget === 'study') applyStudy(parsed);
      else applyRoutineData(parsed);
      reloadAll();
      showMsg('반영 완료', 'ok');
      setTimeout(closeRecordModal, 600);
    } catch(e){
      showMsg('반영 실패: ' + (e && e.message ? e.message : e), 'err');
    }
  }

  $('record-close').addEventListener('click', closeRecordModal);
  $('record-apply').addEventListener('click', applyRecord);
  $('record-select-all').addEventListener('click', () => {
    const ta = $('record-text');
    ta.focus();
    ta.select();
    try { ta.setSelectionRange(0, ta.value.length); } catch(e){}
  });

  // ===== 토스트 =====
  let toastTimer = null;
  function toast(text, kind){
    const t = $('toast');
    t.textContent = text;
    t.className = 'toast show' + (kind ? ' ' + kind : '');
    if(toastTimer){ clearTimeout(toastTimer); toastTimer = null; }
    if(kind){ toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800); }
  }

  // ===== Study(시험 진도) =====
  const DEFAULT_STUDY_CONFIG = {
    version: 'sv1',
    subjects: ['세법학','회계학','재정학','행정소송법'],
    hours_step: 0.5, hours_min: 0, hours_max: 8,
    density_map: { '1':'하', '2':'중', '3':'상' },
    exams: [ { name: '1차', date: '2027-04-25' } ]
  };
  const STUDY_DENSITY_FACTOR = { 1: 0.8, 2: 1.0, 3: 1.2 };
  let currentView = 'habit';
  let studyConfig = null;
  let studyDay = { hours: {}, density: null };
  let studyTotal = 0;

  function loadStudyConfig(){
    let c = getKey('study_config');
    if(!c || typeof c !== 'object'){
      c = JSON.parse(JSON.stringify(DEFAULT_STUDY_CONFIG));
      setKey('study_config', c);
      return c;
    }
    // 비파괴: subjects가 달라도 study:* 일별 기록은 절대 삭제하지 않음. 누락 필드만 보정.
    let updated = false;
    if(c.version !== DEFAULT_STUDY_CONFIG.version){ c.version = DEFAULT_STUDY_CONFIG.version; updated = true; }
    if(!Array.isArray(c.subjects) || !c.subjects.length){ c.subjects = DEFAULT_STUDY_CONFIG.subjects.slice(); updated = true; }
    if(typeof c.hours_step !== 'number'){ c.hours_step = 0.5; updated = true; }
    if(typeof c.hours_min !== 'number'){ c.hours_min = 0; updated = true; }
    if(typeof c.hours_max !== 'number'){ c.hours_max = 8; updated = true; }
    if(!c.density_map){ c.density_map = DEFAULT_STUDY_CONFIG.density_map; updated = true; }
    if(!Array.isArray(c.exams) || !c.exams.length){ c.exams = DEFAULT_STUDY_CONFIG.exams.slice(); updated = true; }
    if(updated) setKey('study_config', c);
    return c;
  }

  function loadStudyDay(d){
    let s = getKey('study:' + dateKey(d));
    if(!s || typeof s !== 'object') s = { hours: {}, density: null };
    if(!s.hours || typeof s.hours !== 'object') s.hours = {};
    if(s.density !== 1 && s.density !== 2 && s.density !== 3) s.density = null;
    return s;
  }
  function saveStudyDay(d, s){ setKey('study:' + dateKey(d), s); }

  function studyDayHours(s){
    let sum = 0;
    if(s && s.hours) Object.keys(s.hours).forEach(k => { const v = s.hours[k]; if(typeof v === 'number') sum += v; });
    return sum;
  }
  function recomputeStudyTotal(){
    let sum = 0;
    listKeys('study:').forEach(k => { sum += studyDayHours(getKey(k)); });
    studyTotal = sum;
  }

  function isWeekend(d){ const w = d.getDay(); return w === 0 || w === 6; }
  // 스터디 달력 농도 = min(1, (시간합 × 밀도계수) / 기준(평일4·주말8))
  function studyRatioFromKey(k){
    const s = getKey('study:' + k);
    if(!s) return 0;
    const hours = studyDayHours(s);
    if(hours <= 0) return 0;
    const factor = STUDY_DENSITY_FACTOR[s.density] || 1.0;
    const p = k.split('-');
    const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
    const base = isWeekend(d) ? 8 : 4;
    return Math.min(1, (hours * factor) / base);
  }

  function ddayString(){
    const ex = studyConfig && studyConfig.exams && studyConfig.exams[0];
    if(!ex || !ex.date) return '';
    const p = ex.date.split('-');
    const target = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2])); target.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((target.getTime() - today.getTime()) / 86400000);
    const label = ex.name || '시험';
    if(diff > 0) return label + '까지  D-' + diff;
    if(diff === 0) return label + '  D-DAY';
    return label + '  D+' + (-diff);
  }
  function renderStudyDate(){
    $('date-label').textContent = `${viewDate.getFullYear()}.${pad(viewDate.getMonth()+1)}.${pad(viewDate.getDate())}`;
    $('date-sub').textContent = ddayString();
  }

  function updateStudySummary(){
    $('study-today').textContent = studyDayHours(studyDay).toFixed(1);
    $('study-total').textContent = String(Math.round(studyTotal * 10) / 10);
  }
  function renderDensity(){
    [1,2,3].forEach(lv => { $('density-' + lv).classList.toggle('active', studyDay.density === lv); });
  }

  function renderStudy(){
    studyDay = loadStudyDay(viewDate);
    const wrap = $('study-cards');
    wrap.innerHTML = '';
    const step = studyConfig.hours_step || 0.5;
    studyConfig.subjects.forEach(name => {
      const row = document.createElement('div');
      row.className = 'study-row';
      row.innerHTML =
        '<div class="study-name"></div>' +
        '<div class="study-ctrl">' +
          '<button type="button" class="study-step" data-act="dec">−</button>' +
          '<span class="study-hours"></span>' +
          '<button type="button" class="study-step" data-act="inc">+</button>' +
        '</div>';
      row.querySelector('.study-name').textContent = name;
      const hoursEl = row.querySelector('.study-hours');
      const decBtn = row.querySelector('[data-act="dec"]');
      const incBtn = row.querySelector('[data-act="inc"]');
      function curHours(){ const v = studyDay.hours[name]; return (typeof v === 'number') ? v : 0; }
      function refresh(){
        const cur = curHours();
        hoursEl.textContent = cur.toFixed(1) + 'h';
        decBtn.disabled = cur <= studyConfig.hours_min + EPSILON;
        incBtn.disabled = cur >= studyConfig.hours_max - EPSILON;
      }
      function change(delta){
        let cur = Math.round((curHours() + delta) / step) * step;
        cur = Math.min(studyConfig.hours_max, Math.max(studyConfig.hours_min, cur));
        cur = Math.round(cur * 10) / 10;
        if(cur > 0) studyDay.hours[name] = cur; else delete studyDay.hours[name];
        refresh();
        saveStudyDay(viewDate, studyDay);
        recomputeStudyTotal();
        updateStudySummary();
        paintCalCell(viewDate);
        haptic();
      }
      decBtn.addEventListener('click', () => change(-step));
      incBtn.addEventListener('click', () => change(step));
      refresh();
      wrap.appendChild(row);
    });
    renderDensity();
    updateStudySummary();
  }

  function setDensity(lv){
    studyDay = loadStudyDay(viewDate);
    studyDay.density = (studyDay.density === lv) ? null : lv;
    saveStudyDay(viewDate, studyDay);
    renderDensity();
    paintCalCell(viewDate);
    haptic();
  }
  [1,2,3].forEach(lv => { $('density-' + lv).addEventListener('click', () => setDensity(lv)); });

  function collectStudy(){
    const data = { format: 'semu-study-1', exported_at: new Date().toISOString(), app_version: APP_VERSION,
                   config: getKey('study_config'), total_hours: 0, days: {} };
    let total = 0;
    listKeys('study:').forEach(k => {
      const dk = k.slice(6);
      const s = getKey(k);
      data.days[dk] = s;
      total += studyDayHours(s);
    });
    data.total_hours = Math.round(total * 10) / 10;
    return data;
  }
  function applyStudy(parsed){
    if(!parsed || typeof parsed !== 'object') throw new Error('스터디 데이터 형식 오류');
    if(parsed.days && typeof parsed.days !== 'object') throw new Error('study days 형식 오류');
    if(parsed.config && Array.isArray(parsed.config.subjects)) setKey('study_config', parsed.config);
    listKeys('study:').forEach(delKey);
    if(parsed.days) Object.keys(parsed.days).forEach(dk => setKey('study:' + dk, parsed.days[dk]));
    studyConfig = loadStudyConfig();
    recomputeStudyTotal();
  }

  // ===== 뷰 라우터 =====
  function onDateSelected(d){
    viewDate = new Date(d);
    if(currentView === 'study'){ renderStudyDate(); renderStudy(); }
    else { renderDate(); renderChecks(); updateSummary(); }
    renderCalendar();
    updateCalNav();
  }
  function showView(name){
    currentView = name;
    const habit = name === 'habit';
    $('view-habit').classList.toggle('hidden', !habit);
    $('view-study').classList.toggle('hidden', habit);
    $('nav-habit').classList.toggle('active', habit);
    $('nav-study').classList.toggle('active', !habit);
    if(habit){ renderDate(); renderChecks(); updateSummary(); }
    else { renderStudyDate(); renderStudy(); }
    renderCalendar();
    updateCalNav();
  }
  // import/복구 후 전체 재렌더
  function reloadAll(){
    if(currentView === 'study'){ renderStudyDate(); renderStudy(); }
    else { renderDate(); renderChecks(); updateSummary(); }
    renderCalendar();
    updateCalNav();
  }

  // ===== GitHub 동기화 (2파일) =====
  // 설정은 신규 키 'sync'에만 저장 — 기존 day:/legacy:/config/total_liter/study 와 무관.
  function getSyncConfig(){
    const s = getKey('sync') || {};
    let routinePath = s.routine_path;
    if(!routinePath){ routinePath = (s.path && s.path !== 'journal.json') ? s.path : 'daily_routine.json'; }
    return {
      owner:  s.owner  || '',
      repo:   s.repo   || 'CHI_fee_data',
      branch: s.branch || 'main',
      pat:    s.pat    || '',
      routine_path: routinePath || 'daily_routine.json',
      study_path:   s.study_path || 'semu_study.json'
    };
  }
  function readSyncInputs(){
    return {
      owner:  $('set-owner').value.trim(),
      repo:   $('set-repo').value.trim()   || 'CHI_fee_data',
      branch: $('set-branch').value.trim() || 'main',
      pat:    $('set-pat').value.trim(),
      routine_path: $('set-routine-path').value.trim() || 'daily_routine.json',
      study_path:   $('set-study-path').value.trim()   || 'semu_study.json'
    };
  }
  function saveSyncConfig(cfg){ setKey('sync', cfg); }

  function toBase64(str){
    const bytes = new TextEncoder().encode(str);
    let bin = '';
    for(let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }
  function fromBase64(b64){
    const bin = atob(String(b64).replace(/\s/g, ''));
    const bytes = new Uint8Array(bin.length);
    for(let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }
  // 기록된 날 수 (day + legacy 또는 study days) — 빈 데이터 판별용
  function recordEntryCount(rec){
    let n = 0;
    if(rec && rec.days   && typeof rec.days   === 'object') n += Object.keys(rec.days).length;
    if(rec && rec.legacy && typeof rec.legacy === 'object') n += Object.keys(rec.legacy).length;
    return n;
  }
  async function safeErr(res){
    try { const j = await res.json(); return (j && j.message) ? j.message : (res.statusText || ''); }
    catch(e){ return res.statusText || ''; }
  }
  function ghHeaders(cfg){
    return { 'Authorization': 'Bearer ' + cfg.pat, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
  }
  function ghUrl(cfg, path){
    const encPath = path.split('/').map(encodeURIComponent).join('/');
    return 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + encPath;
  }

  // 한 파일 올리기 (sha 조회→PUT). 폰이 비었는데 repo에 데이터면 차단.
  async function ghPutFile(cfg, path, jsonObj){
    const apiUrl = ghUrl(cfg, path);
    const headers = ghHeaders(cfg);
    const localCount = recordEntryCount(jsonObj);
    const content = toBase64(JSON.stringify(jsonObj, null, 2));
    let sha = null;
    const getRes = await fetch(apiUrl + '?ref=' + encodeURIComponent(cfg.branch), { headers: headers });
    if(getRes.ok){
      const j = await getRes.json();
      sha = j && j.sha ? j.sha : null;
      if(localCount === 0 && j && j.content){
        let remoteCount = 0;
        try { remoteCount = recordEntryCount(JSON.parse(fromBase64(j.content))); } catch(e){}
        if(remoteCount > 0) throw new Error(path + ': 폰이 비었는데 repo에 ' + remoteCount + '건 — 덮어쓰기 차단(복구를 쓰세요)');
      }
    } else if(getRes.status !== 404){
      throw new Error(path + ' 조회 실패 ' + getRes.status + ': ' + await safeErr(getRes));
    }
    const body = { message: path.replace(/\.json$/, '') + ' sync ' + dateKey(new Date()), content: content, branch: cfg.branch };
    if(sha) body.sha = sha;
    const putRes = await fetch(apiUrl, { method: 'PUT', headers: Object.assign({ 'Content-Type': 'application/json' }, headers), body: JSON.stringify(body) });
    if(!putRes.ok) throw new Error(path + ' 올리기 실패 ' + putRes.status + ': ' + await safeErr(putRes));
    const pj = await putRes.json();
    return (pj && pj.commit && pj.commit.sha) ? pj.commit.sha.slice(0,7) : '?';
  }

  async function ghGetFile(cfg, path){
    const res = await fetch(ghUrl(cfg, path) + '?ref=' + encodeURIComponent(cfg.branch), { headers: ghHeaders(cfg) });
    if(res.status === 404) return null;
    if(!res.ok) throw new Error(path + ' 조회 실패 ' + res.status + ': ' + await safeErr(res));
    const j = await res.json();
    if(!j || !j.content) return null;
    try { return JSON.parse(fromBase64(j.content)); } catch(e){ throw new Error(path + ' 파싱 실패'); }
  }

  function validSyncCfg(cfg){
    if(!cfg.pat){ toast('PAT를 입력하세요 (⚙ 설정)', 'err'); return false; }
    if(!cfg.owner){ toast('owner를 입력하세요 (⚙ 설정)', 'err'); return false; }
    if(!cfg.repo){ toast('레포명을 입력하세요', 'err'); return false; }
    return true;
  }

  let syncBusy = false;
  async function syncUp(cfg){
    if(syncBusy) return;
    if(!validSyncCfg(cfg)) return;
    syncBusy = true;
    toast('올리기 중…', '');
    try {
      await ghPutFile(cfg, cfg.routine_path, collectRecord());
      await ghPutFile(cfg, cfg.study_path, collectStudy());
      setKey('last_sync', new Date().toISOString());
      updateLastSync();
      const now = new Date();
      toast('올리기 완료 · 2/2 · ' + pad(now.getHours()) + ':' + pad(now.getMinutes()), 'ok');
    } catch(e){
      toast('올리기 실패: ' + (e && e.message ? e.message : e), 'err');
    } finally { syncBusy = false; }
  }

  async function syncDown(cfg){
    if(syncBusy) return;
    if(!validSyncCfg(cfg)) return;
    const localCount = recordEntryCount(collectRecord()) + Object.keys(collectStudy().days).length;
    if(localCount > 0 && !window.confirm('repo 데이터로 폰을 덮어씁니다. 폰의 현재 기록이 사라질 수 있어요. 계속할까요?')) return;
    syncBusy = true;
    toast('복구 중…', '');
    try {
      const r = await ghGetFile(cfg, cfg.routine_path);
      const s = await ghGetFile(cfg, cfg.study_path);
      let n = 0;
      if(r){ applyRoutineData(r); n++; }
      if(s){ applyStudy(s); n++; }
      setKey('last_sync', new Date().toISOString());
      updateLastSync();
      reloadAll();
      toast(n > 0 ? ('복구 완료 · ' + n + '/2') : '복구할 데이터가 repo에 없습니다', n > 0 ? 'ok' : 'err');
    } catch(e){
      toast('복구 실패: ' + (e && e.message ? e.message : e), 'err');
    } finally { syncBusy = false; }
  }

  // ===== 설정(⚙) 화면 =====
  function setMsg(text, kind){
    const m = $('set-msg'); m.textContent = text; m.className = 'modal-msg' + (kind ? ' ' + kind : '');
  }
  function updateLastSync(){
    const ls = getKey('last_sync');
    $('set-lastsync').textContent = '마지막 동기화: ' + (ls ? ls.replace('T', ' ').slice(0, 16) : '없음');
  }
  function openSettings(){
    const cfg = getSyncConfig();
    $('set-owner').value = cfg.owner;
    $('set-repo').value = cfg.repo;
    $('set-branch').value = cfg.branch;
    $('set-pat').value = cfg.pat;
    $('set-routine-path').value = cfg.routine_path;
    $('set-study-path').value = cfg.study_path;
    setMsg('', '');
    updateLastSync();
    $('modal-settings').classList.remove('hidden');
  }
  function closeSettings(){
    saveSyncConfig(readSyncInputs());
    $('modal-settings').classList.add('hidden');
  }

  // ===== 하단 바 / 설정 wiring =====
  $('nav-habit').addEventListener('click', () => showView('habit'));
  $('nav-study').addEventListener('click', () => showView('study'));
  $('nav-sync').addEventListener('click', () => {
    const cfg = getSyncConfig();
    if(!cfg.pat || !cfg.owner){ toast('먼저 ⚙ 설정에서 토큰을 입력하세요', 'err'); openSettings(); return; }
    syncUp(cfg);
  });
  $('nav-settings').addEventListener('click', openSettings);
  $('set-close').addEventListener('click', closeSettings);
  $('set-up').addEventListener('click', () => { const cfg = readSyncInputs(); saveSyncConfig(cfg); syncUp(cfg); });
  $('set-down').addEventListener('click', () => { const cfg = readSyncInputs(); saveSyncConfig(cfg); syncDown(cfg); });
  $('set-raw-routine').addEventListener('click', () => openRawModal('routine'));
  $('set-raw-study').addEventListener('click', () => openRawModal('study'));

  try {
    const cr = loadConfig();
    config = cr.config;
    computeItemLiters();

    runLegacyImport();
    initTotalLiter();
    recomputeItemCounts();

    // 스터디 초기화 (습관과 독립)
    studyConfig = loadStudyConfig();
    recomputeStudyTotal();

    showView('habit');
    $('loading').classList.add('hidden');
    $('app').classList.remove('hidden');
    $('navbar').classList.remove('hidden');
  } catch(e){
    $('loading').textContent = '오류: ' + (e && e.message ? e.message : '알 수 없음');
  }

  // service worker 등록 — 홈화면 웹클립이 켤 때마다 최신 버전을 받게(network-first).
  // 데이터(localStorage)는 건드리지 않음. 실패해도 앱 동작에는 영향 없음.
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
})();
</script>
